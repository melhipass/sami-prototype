<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#283891;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22C7E8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>
  
  <!-- Baby face icon - centered and larger -->
  <g transform="translate(512, 512)">
    <!-- Head -->
    <circle cx="0" cy="0" r="280" fill="url(#iconGradient)"/>
    
    <!-- Eyes -->
    <circle cx="-90" cy="-50" r="36" fill="#283891"/>
    <circle cx="90" cy="-50" r="36" fill="#283891"/>
    
    <!-- Eye highlights -->
    <circle cx="-77" cy="-63" r="16" fill="white"/>
    <circle cx="103" cy="-63" r="16" fill="white"/>
    
    <!-- Smile -->
    <path d="M -100 50 Q 0 130 100 50" stroke="#283891" stroke-width="26" fill="none" stroke-linecap="round"/>
    
    <!-- Cheeks -->
    <circle cx="-150" cy="25" r="38" fill="#22C7E8" opacity="0.3"/>
    <circle cx="150" cy="25" r="38" fill="#22C7E8" opacity="0.3"/>
    
    <!-- Hair tufts -->
    <circle cx="-50" cy="-230" r="58" fill="url(#iconGradient)"/>
    <circle cx="50" cy="-230" r="58" fill="url(#iconGradient)"/>
    <circle cx="0" cy="-250" r="52" fill="url(#iconGradient)"/>
  </g>
</svg>
